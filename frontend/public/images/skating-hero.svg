<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="heroPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Abstract ice rink shape -->
  <ellipse cx="400" cy="350" rx="320" ry="180" fill="url(#heroPrimary)" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Decorative arcs - skating trails -->
  <path d="M120 420 Q250 300 400 320 Q550 340 680 280" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-linecap="round"/>
  <path d="M150 440 Q280 320 400 340 Q520 360 650 300" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>

  <!-- Spiral patterns (skating spins) -->
  <path d="M300 280 C320 250 360 240 380 260 C400 280 380 310 350 300 C320 290 310 270 330 260" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
  <path d="M500 300 C520 270 560 260 580 280 C600 300 580 330 550 320 C520 310 510 290 530 280" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>

  <!-- Geometric diamonds -->
  <polygon points="200,200 220,180 240,200 220,220" fill="#06b6d4" fill-opacity="0.3"/>
  <polygon points="560,180 580,160 600,180 580,200" fill="#3b82f6" fill-opacity="0.25"/>
  <polygon points="400,150 415,135 430,150 415,165" fill="#06b6d4" fill-opacity="0.2"/>

  <!-- Ice crystal lines -->
  <line x1="650" y1="150" x2="700" y2="200" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="650" y1="200" x2="700" y2="150" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.2"/>
  <line x1="100" y1="150" x2="150" y2="200" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.25"/>
  <line x1="100" y1="200" x2="150" y2="150" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Small floating particles -->
  <circle cx="180" cy="250" r="2" fill="#06b6d4" fill-opacity="0.4"/>
  <circle cx="620" cy="260" r="2" fill="#3b82f6" fill-opacity="0.35"/>
  <circle cx="350" cy="180" r="1.5" fill="#06b6d4" fill-opacity="0.3"/>
  <circle cx="480" cy="220" r="1.5" fill="#3b82f6" fill-opacity="0.25"/>
  <circle cx="250" cy="350" r="2.5" fill="#06b6d4" fill-opacity="0.2"/>
  <circle cx="550" cy="370" r="2" fill="#3b82f6" fill-opacity="0.15"/>

  <!-- Star shapes -->
  <polygon points="400,280 403,288 412,288 405,293 407,302 400,296 393,302 395,293 388,288 397,288" fill="#06b6d4" fill-opacity="0.3"/>
  <polygon points="200,320 202,326 208,326 203,330 205,336 200,332 195,336 197,330 192,326 198,326" fill="#3b82f6" fill-opacity="0.2"/>
  <polygon points="600,340 602,346 608,346 603,350 605,356 600,352 595,356 597,350 592,346 598,346" fill="#06b6d4" fill-opacity="0.15"/>
</svg>